<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RFID">
    <title>Hôtel RFID — Connexion</title>
    <style>
        :root {
            --primary: #2563eb;
            --card: #ffffff;
            --bg: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
        }
        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            color: #0f172a;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { transform: translateY(-2px); }
        .error {
            color: #ef4444;
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">🏨</div>
        <h1>Hôtel RFID UHF</h1>
        <p class="subtitle">Lecteur UHF — Système de traçabilité</p>

        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required autofocus>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>

        <div id="error" class="error">
            Identifiants incorrects. Veuillez réessayer.
        </div>
    </div>

    <script>
        // Show error message if ?error=1 in URL
        if (window.location.search.includes('error=1')) {
            document.getElementById('error').style.display = 'block';
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('SW registered:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
