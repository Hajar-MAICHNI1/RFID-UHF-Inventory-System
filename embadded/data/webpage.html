<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="RFID">
    <title>Hôtel RFID — Lecteur UHF</title>
    <style>
        :root {
            --primary:   #2563eb;
            --save:      #ea580c;
            --saveall:   #7c3aed;
            --success:   #10b981;
            --danger:    #ef4444;
            --bg:        #f8fafc;
            --card:      #ffffff;
            --border:    #e2e8f0;
            --text:      #0f172a;
            --text-sec:  #475569;
            --shadow:    0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius:    20px;
            --mono:      ui-monospace, 'SF Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            /* Safe area for phones with notch / home indicator */
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            padding-left:   max(16px, env(safe-area-inset-left));
            padding-right:  max(16px, env(safe-area-inset-right));
        }

        /* ─── Header ─── */
        .header {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left   { display: flex; align-items: center; gap: 12px; }
        .header-logo   { font-size: 42px; filter: drop-shadow(0 4px 8px rgba(37,99,235,0.25)); }
        .header h1     { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; }
        .header h1 span { font-weight: 500; color: #64748b; font-size: 19px; }

        .badges { display: flex; gap: 10px; flex-wrap: wrap; }
        .badge {
            padding: 9px 18px;
            border-radius: 9999px;
            font-size: 13.5px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }
        .badge-wifi-ok   { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #166534; border: 1px solid #6ee7b7; }
        .badge-wifi-err  { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .badge-check     { background: linear-gradient(135deg, #bfdbfe, #93c5fd); color: #1e40af; }
        .badge-save      { background: linear-gradient(135deg, #fed7aa, #fdba74); color: #9a3412; }
        .badge-saveall   { background: linear-gradient(135deg, #e0e7ff, #c4b5fd); color: #4c1d95; }
        .badge-relay-off { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .badge-relay-on  { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #166534; border: 1px solid #6ee7b7; }

        .status-dot {
            width: 9px; height: 9px; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }

        /* ─── Alert banner ─── */
        .msg-alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        .msg-alert.show { display: block; }
        .msg-alert.ok  { background: #d1fae5; color: #166534; border: 1px solid #6ee7b7; }
        .msg-alert.err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Main card ─── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            min-height: 420px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }
        .card-icon     { font-size: 34px; }
        .card-title    { font-size: 21px; font-weight: 700; }
        .card-subtitle { color: var(--text-sec); font-size: 14.5px; margin-top: 4px; }

        /* ─── Waiting state ─── */
        .waiting {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-sec);
        }
        .waiting-icon { font-size: 62px; margin-bottom: 16px; animation: bounce 2.2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* ─── EPC display box ─── */
        .epc-box {
            background: #f8fafc;
            border: 2px solid #bfdbfe;
            border-radius: 16px;
            padding: 20px;
            font-family: var(--mono);
            font-size: 15px;
            letter-spacing: 1.8px;
            word-break: break-all;
            color: #1e40af;
            margin-bottom: 20px;
        }

        /* ─── Detected banner ─── */
        .detected-banner {
            background: linear-gradient(135deg, #fefce8, #fef08c);
            border-left: 6px solid #eab308;
            padding: 18px 20px;
            border-radius: 16px;
            font-weight: 700;
            color: #854d0e;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease;
        }

        /* ─── Buttons ─── */
        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover:not(:disabled)  { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.15); }
        .btn:active:not(:disabled) { transform: translateY(-1px); }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-save      { background: linear-gradient(135deg, #ea580c, #f59e0b); color: white; }
        .btn-saveall   { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: white; }
        .btn-secondary { background: #f1f5f9; color: var(--text-sec); border: 2px solid var(--border); }
        .btn-danger    { background: linear-gradient(135deg, #ef4444, #f87171); color: white; }

        /* ─── Select ─── */
        .save-form  { margin-top: 10px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text); font-size: 14px; }
        .select-wrapper { position: relative; }
        .type-select {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: #fff;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23475669' height='20' viewBox='0 0 20 20' width='20'><path d='M5.5 7.5l4.5 4 4.5-4'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            transition: all 0.25s ease;
        }
        .type-select:hover  { border-color: #cbd5f5; }
        .type-select:focus  { outline: none; border-color: var(--save); box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15); }
        .form-actions       { margin-top: 18px; display: flex; gap: 12px; }
        .form-actions .btn  { flex: 1; }

        /* ─── CHECK mode list ─── */
        .check-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .check-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .check-epc  { font-family: var(--mono); font-size: 14px; flex: 1; word-break: break-all; }
        .pill       { padding: 7px 18px; border-radius: 9999px; font-weight: 700; font-size: 13.5px; white-space: nowrap; margin-left: 12px; }
        .pill-ok    { background: #d1fae5; color: #166534; }
        .pill-err   { background: #fee2e2; color: #991b1b; }

        /* ─── SAVEALL mode ─── */
        .batch-counter {
            font-size: 78px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0 8px;
        }
        .batch-list {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 20px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        .batch-epc {
            font-family: var(--mono);
            font-size: 13px;
            color: #4c1d95;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #7c3aed;
            animation: slideIn 0.3s ease;
        }
        .batch-epc:last-child { margin-bottom: 0; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ─── Countdown ─── */
        .countdown-wrapper {
            background: #fef08c;
            border-left: 4px solid #eab308;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .countdown-label { font-size: 13px; color: #854d0e; font-weight: 600; margin-bottom: 4px; }
        .countdown-time  { font-size: 28px; font-weight: 700; color: #ea580c; text-align: center; }

        /* ─── Scrollbar ─── */
        .check-list::-webkit-scrollbar,
        .batch-list::-webkit-scrollbar { width: 6px; }
        .check-list::-webkit-scrollbar-track,
        .batch-list::-webkit-scrollbar-track { background: transparent; }
        .check-list::-webkit-scrollbar-thumb,
        .batch-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .check-list::-webkit-scrollbar-thumb:hover,
        .batch-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ─── Logout button ─── */
        .btn-logout {
            padding: 9px 18px;
            border-radius: 9999px;
            font-size: 13.5px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #fecaca;
            background: #fee2e2;
            color: #991b1b;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-logout:hover { background: #fecaca; transform: translateY(-1px); }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">🏨</div>
            <div>
                <h1>Hôtel RFID <span>UHF</span></h1>
            </div>
        </div>
        <div class="badges" id="badges"></div>
        <a href="/logout" class="btn-logout" onclick="return confirm('Se déconnecter ?')">
            🚪 Déconnexion
        </a>
    </div>

    <!-- GLOBAL MESSAGE -->
    <div class="msg-alert" id="msg-alert"></div>

    <!-- MAIN CARD -->
    <div class="card" id="main-card">
        <div class="card-header" id="card-header"></div>
        <div id="card-content"></div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════
    // State tracking — prevent unnecessary DOM re-renders
    // ═══════════════════════════════════════════════════════
    let ws;
    let lastSaveState   = null;
    let lastCheckCount  = -1;
    let lastBatchCount  = -1;
    let lastBatchResult = null;

    // ═══════════════════════════════════════════════════════
    // WebSocket connection with auto-reconnect
    // ═══════════════════════════════════════════════════════
    function connect() {
        ws = new WebSocket('wss://' + location.host + '/ws');
        ws.onopen  = () => console.log('✅ WebSocket connected');
        ws.onclose = () => setTimeout(connect, 3000);
        ws.onerror = () => ws.close();
        ws.onmessage = (e) => {
            try { updateUI(JSON.parse(e.data)); }
            catch(err) { console.error('WS parse error:', err); }
        };
    }
    connect();

    // ═══════════════════════════════════════════════════════
    // Main UI update
    // ═══════════════════════════════════════════════════════
    function updateUI(d) {
        renderBadges(d);
        renderAlert(d);
        renderCard(d);
    }

    // ── Badges ──────────────────────────────────────────────
    function renderBadges(d) {
        const modeColor = { CHECK: '#2563eb', SAVE: '#ea580c', SAVEALL: '#7c3aed' };
        document.getElementById('badges').innerHTML = `
            <span class="badge ${d.wifi ? 'badge-wifi-ok' : 'badge-wifi-err'}">
                <span class="status-dot" style="background:${d.wifi ? '#10b981' : '#ef4444'}"></span>
                WIFI ${d.wifi ? 'OK' : 'ERR'}
            </span>
            <span class="badge badge-${d.mode.toLowerCase()}">
                <span class="status-dot" style="background:${modeColor[d.mode] || '#64748b'}"></span>
                ${d.mode}
            </span>
            <span class="badge ${d.relay ? 'badge-relay-on' : 'badge-relay-off'}">
                <span class="status-dot" style="background:${d.relay ? '#10b981' : '#d1d5db'}"></span>
                ${d.relay ? '🔓 OUVERT' : '🔒 FERMÉ'}
            </span>`;
    }

    // ── Alert banner ────────────────────────────────────────
    function renderAlert(d) {
        const el = document.getElementById('msg-alert');
        if (d.message) {
            el.textContent = d.message;
            el.className   = 'msg-alert show ' + (d.msgType === 'ok' ? 'ok' : 'err');
        } else {
            el.className = 'msg-alert';
        }
    }

    // ── Card dispatcher ─────────────────────────────────────
    function renderCard(d) {
        const iconMap     = { CHECK: '📡', SAVE: '🏷️', SAVEALL: '📦' };
        const titleMap    = { CHECK: 'Vérification Multi-Tags', SAVE: 'Enregistrement Unitaire', SAVEALL: 'Enregistrement par Lot' };
        const subtitleMap = {
            CHECK:   'Scannez les objets pour vérifier leur enregistrement',
            SAVE:    'Enregistrez un seul objet à la fois',
            SAVEALL: 'Collectez et enregistrez plusieurs objets rapidement'
        };

        document.getElementById('card-header').innerHTML = `
            <span class="card-icon">${iconMap[d.mode]}</span>
            <div>
                <div class="card-title">${titleMap[d.mode]}</div>
                <div class="card-subtitle">${subtitleMap[d.mode]}</div>
            </div>`;

        if      (d.mode === 'CHECK')   renderCheckMode(d);
        else if (d.mode === 'SAVE')    renderSaveMode(d);
        else if (d.mode === 'SAVEALL') renderSaveAllMode(d);
    }

    // ═══════════════════════════════════════════════════════
    // CHECK mode
    // ═══════════════════════════════════════════════════════
    function renderCheckMode(d) {
        const container = document.getElementById('card-content');
        const list      = d.checkList || [];

        if (list.length === 0) {
            if (lastCheckCount !== 0) {
                lastCheckCount = 0;
                container.innerHTML = `
                    <div class="waiting">
                        <div class="waiting-icon">📡</div>
                        <p><strong>En attente de tags RFID…</strong></p>
                        <small>Chaque tag sera vérifié automatiquement</small>
                    </div>`;
            }
            return;
        }

        if (lastCheckCount !== list.length) {
            lastCheckCount = list.length;
            let items = '';
            list.forEach(item => {
                const isFound = item.result && item.result.startsWith('FOUND');
                let label = '❌ INCONNU';
                if (isFound) {
                    label = item.result.includes('|')
                        ? '✅ ' + item.result.split('|')[1]
                        : '✅ TROUVÉ';
                }
                items += `
                    <div class="check-item">
                        <span class="check-epc">${escHtml(item.epc)}</span>
                        <span class="pill ${isFound ? 'pill-ok' : 'pill-err'}">${label}</span>
                    </div>`;
            });

            container.innerHTML = `
                <div class="check-list" id="check-list">${items}</div>
                <br>
                <button class="btn btn-secondary"
                    onclick="confirmAction('Effacer l\\'historique ?', () => ws.send('CLEAR_CHECK'))">
                    🗑️ Effacer l'historique
                </button>`;

            const el = document.getElementById('check-list');
            if (el) el.scrollTop = el.scrollHeight;
        }
    }

    // ═══════════════════════════════════════════════════════
    // SAVE mode
    // ═══════════════════════════════════════════════════════
    function renderSaveMode(d) {
        const container = document.getElementById('card-content');
        const stateKey  = `${d.tagDetecte}|${d.tag}`;

        if (!d.tagDetecte || !d.tag) {
            if (lastSaveState !== 'waiting') {
                lastSaveState = 'waiting';
                container.innerHTML = `
                    <div class="waiting">
                        <div class="waiting-icon">🏷️</div>
                        <p><strong>Présentez un tag RFID…</strong></p>
                        <small>Le formulaire apparaîtra automatiquement</small>
                    </div>`;
            }
            return;
        }

        if (lastSaveState !== stateKey) {
            lastSaveState = stateKey;
            let options = '<option value="">-- Sélectionner un type --</option>';
            if (Array.isArray(d.types)) {
                d.types.forEach(t => {
                    options += `<option value="${escAttr(t.num)}">${escHtml(t.nom)}</option>`;
                });
            }

            container.innerHTML = `
                <div class="detected-banner">✨ Tag détecté !</div>
                <div class="epc-box">${escHtml(d.tag)}</div>
                <div class="msg-alert" id="save-err"></div>
                <form id="save-form" class="save-form" onsubmit="handleSave(event)">
                    <input type="hidden" name="epc" value="${escAttr(d.tag)}">
                    <div class="form-group">
                        <label class="form-label">📌 Type d'objet</label>
                        <div class="select-wrapper">
                            <select name="type_numero" id="type-select" class="type-select" required>
                                ${options}
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="save-btn" class="btn btn-save">
                            💾 Enregistrer
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="cancelSave()">
                            ✖ Annuler
                        </button>
                    </div>
                </form>`;
            return;
        }

        updateTypeSelect(d.types);
    }

    function updateTypeSelect(types) {
        const sel = document.getElementById('type-select');
        if (!sel || !Array.isArray(types)) return;
        if (sel.options.length === types.length + 1) return;
        const saved = sel.value;
        let html = '<option value="">-- Sélectionner un type --</option>';
        types.forEach(t => {
            html += `<option value="${escAttr(t.num)}">${escHtml(t.nom)}</option>`;
        });
        sel.innerHTML = html;
        sel.value = saved;
    }

    function handleSave(e) {
        e.preventDefault();
        const form  = e.target;
        const btn   = document.getElementById('save-btn');
        const errEl = document.getElementById('save-err');

        btn.disabled    = true;
        btn.textContent = '⏳ Envoi en cours…';
        if (errEl) errEl.className = 'msg-alert';

        fetch('/save', { method: 'POST', body: new FormData(form) })
            .then(r => {
                if (r.status === 401) { location.href = '/login'; return null; }
                return r.json();
            })
            .then(data => {
                if (!data) return;
                if (data.status === 'ok') {
                    lastSaveState = null;
                    ws.send('CANCEL_SAVE');
                } else {
                    showSaveError('❌ ' + (data.msg || 'Erreur inconnue'));
                    btn.disabled    = false;
                    btn.textContent = '💾 Enregistrer';
                }
            })
            .catch(() => {
                showSaveError('❌ Erreur réseau — vérifiez la connexion et réessayez');
                btn.disabled    = false;
                btn.textContent = '💾 Enregistrer';
            });
    }

    function showSaveError(msg) {
        const el = document.getElementById('save-err');
        if (!el) return;
        el.textContent = msg;
        el.className   = 'msg-alert show err';
    }

    function cancelSave() {
        if (confirm('Annuler cet enregistrement ?')) {
            lastSaveState = null;
            ws.send('CANCEL_SAVE');
        }
    }

    // ═══════════════════════════════════════════════════════
    // SAVEALL mode
    // ═══════════════════════════════════════════════════════
    function renderSaveAllMode(d) {
        const container  = document.getElementById('card-content');
        const batchList  = d.batchList  || [];
        const batchCount = batchList.length;

        if (d.batchResult && d.batchResult !== '') {
            if (lastBatchResult !== d.batchResult) {
                lastBatchResult = d.batchResult;
                lastBatchCount  = -1;
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;">
                        <div style="font-size:64px;margin-bottom:12px;">✅</div>
                        <p style="font-size:17px;color:var(--text-sec);margin-bottom:16px;">
                            Enregistrement terminé avec succès !
                        </p>
                        <div class="epc-box" style="text-align:left;">${escHtml(d.batchResult)}</div>
                        <button class="btn btn-saveall" onclick="clearBatch()">↩️ Nouveau lot</button>
                    </div>`;
            }
            return;
        }

        lastBatchResult = null;

        if (batchCount === 0) {
            if (lastBatchCount !== 0) {
                lastBatchCount = 0;
                container.innerHTML = `
                    <div class="waiting">
                        <div class="waiting-icon">📦</div>
                        <p><strong>Présentez les tags RFID…</strong></p>
                        <small>Ils seront ajoutés au lot automatiquement</small>
                    </div>`;
            }
            return;
        }

        if (lastBatchCount !== batchCount) {
            lastBatchCount = batchCount;
            let items = '';
            batchList.forEach(epc => {
                items += `<div class="batch-epc">● ${escHtml(epc)}</div>`;
            });

            container.innerHTML = `
                <div class="batch-counter">${batchCount}</div>
                <div style="text-align:center;font-size:14px;color:var(--text-sec);margin-bottom:20px;">
                    tags collectés
                </div>
                <div id="countdown-area"></div>
                <div class="batch-list" id="batch-list">${items}</div>
                <button class="btn btn-saveall"
                    onclick="confirmAction('Enregistrer maintenant ?', () => ws.send('SAVE_BATCH'))">
                    💾 Enregistrer maintenant
                </button>
                <button class="btn btn-danger"
                    onclick="confirmAction('Vider le lot ?', clearBatch)">
                    🗑️ Vider le lot
                </button>`;

            const el = document.getElementById('batch-list');
            if (el) el.scrollTop = el.scrollHeight;
        }

        const cdArea = document.getElementById('countdown-area');
        if (cdArea) {
            if (d.batchPending && d.timeLeft > 0) {
                cdArea.innerHTML = `
                    <div class="countdown-wrapper">
                        <div class="countdown-label">Enregistrement automatique dans</div>
                        <div class="countdown-time">${d.timeLeft}s</div>
                    </div>`;
            } else {
                cdArea.innerHTML = '';
            }
        }
    }

    function clearBatch() {
        lastBatchCount  = -1;
        lastBatchResult = null;
        ws.send('CLEAR_BATCH');
    }

    // ═══════════════════════════════════════════════════════
    // Utilities
    // ═══════════════════════════════════════════════════════
    function confirmAction(message, callback) {
        if (confirm(message)) callback();
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escAttr(str) {
        return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ═══════════════════════════════════════════════════════
    // PWA — Service Worker registration
    // ═══════════════════════════════════════════════════════
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
    }
    </script>
</body>
</html>
